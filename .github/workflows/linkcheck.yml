name: Link Checker

on:
  schedule:
    - cron: "0 12 * * 1" # weekly, Monday 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v4.2.2
      - name: Set up Node
        uses: actions/setup-node@v4 # v4.1.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check member links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run check-links
